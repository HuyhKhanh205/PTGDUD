<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Part 2 - Challenge #3: Objects</title>
  </head>
  <body>
    <div class="container">
      <h2>Challenge #3: Objects & 'this'</h2>
      <button onclick="runObjectChallenge()">Run</button>
      <div id="display"></div>
    </div>

    <script>
      function runObjectChallenge() {
        const mark = {
          fullName: "Mark Miller",
          mass: 78,
          height: 1.69,
          calcBMI: function () {
            this.bmi = this.mass / this.height ** 2;
            return this.bmi;
          },
        };

        const john = {
          fullName: "John Smith",
          mass: 92,
          height: 1.95,
          calcBMI: function () {
            this.bmi = this.mass / this.height ** 2;
            return this.bmi;
          },
        };
        mark.calcBMI();
        john.calcBMI();

        let result = `Object Mark: { bmi: ${mark.bmi.toFixed(2)} }\nObject John: { bmi: ${john.bmi.toFixed(2)} }\n\n`;

        if (mark.bmi > john.bmi) {
          result += `${mark.fullName}'s BMI (${mark.bmi.toFixed(1)}) is higher than ${john.fullName}'s (${john.bmi.toFixed(1)})!`;
        } else {
          result += `${john.fullName}'s BMI (${john.bmi.toFixed(1)}) is higher than ${mark.fullName}'s (${mark.bmi.toFixed(1)})!`;
        }

        document.getElementById("display").innerHTML = `<pre>${result}</pre>`;
      }
    </script>
  </body>
</html>
